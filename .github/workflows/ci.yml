name: backend-ci

# Garante que o que roda em produção é EXATAMENTE o que está no código:
# todo push/PR compila, testa (unit + e2e com Postgres real) e builda a imagem.
on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/ci.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/ci.yml']

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prontuario
          POSTGRES_PASSWORD: prontuario
          POSTGRES_DB: prontuario_e2_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U prontuario -d prontuario_e2_test"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://prontuario:prontuario@localhost:5432/prontuario_e2_test
      JWT_ACCESS_SECRET: ci-access-secret-please-change
      JWT_REFRESH_SECRET: ci-refresh-secret-please-change
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install (lockfile-strict)
        run: npm ci

      - name: Prisma generate + migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Build (type-check real)
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: E2E tests (isolamento multi-tenant)
        run: npm run test:e2e

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build da imagem no MESMO commit testado. Marque com o SHA para
      # rastreabilidade: a imagem em produção sempre aponta para um commit.
      - name: Docker build
        run: docker build -t pee2-api:${{ github.sha }} ./backend
      # Em produção, faça o deploy referenciando :${{ github.sha }} (imutável),
      # nunca :latest — elimina o drift "código ≠ Docker".
