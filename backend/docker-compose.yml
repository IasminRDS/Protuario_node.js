services:
  postgres:
    image: postgres:16-alpine
    container_name: pee2-postgres
    environment:
      POSTGRES_USER: prontuario
      POSTGRES_PASSWORD: prontuario
      POSTGRES_DB: prontuario_e2
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prontuario -d prontuario_e2']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pee2-redis
    ports:
      - '6379:6379'

  # Kafka em modo KRaft (sem Zookeeper) — backbone de eventos (SNPE/ADR-04).
  kafka:
    image: apache/kafka:3.8.0
    container_name: pee2-kafka
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    # Build a partir da RAIZ do monorepo (usa o package-lock.json autoritativo
    # dos workspaces). O Dockerfile antigo em backend/ usava um lock órfão.
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: pee2-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # Backbone de eventos: Kafka real (ADR-04). Fallback = LoggingEventBus.
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: snpe-api
      # RLS ATIVO (gate rls-phase1.e2e 7/7 verde em 2026-07-10):
      #  - o APP conecta como a role NÃO-dona `prontuario_app` (RLS enforced);
      #  - `migrate deploy` roda como a role DONA via MIGRATE_DATABASE_URL
      #    (migrations precisam de ownership; o comando abaixo troca a URL).
      DATABASE_URL: postgresql://prontuario_app:prontuario_app@postgres:5432/prontuario_e2
      MIGRATE_DATABASE_URL: postgresql://prontuario:prontuario@postgres:5432/prontuario_e2
      # Manutenção (role DONA): refresh de materialized views + pg_dump.
      MAINTENANCE_DATABASE_URL: postgresql://prontuario:prontuario@postgres:5432/prontuario_e2
      RLS_ENABLED: "true"
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      CORS_ORIGINS: http://localhost:3001,http://localhost:4300
      # Login gov.br (OIDC) — simulador embutido em dev/homolog.
      GOVBR_ENABLED: "true"
      GOVBR_SIMULATOR: "true"
      GOVBR_FRONTEND_URL: http://localhost:3001/login
      # Assinatura digital: sem DOC_SIGNING_PRIVATE_KEY usa par RSA efêmero (dev).
      DOC_VERIFY_URL: http://localhost:3001/verificar
      # Rate limit — ATENÇÃO: throttler v6 usa TTL em MILISSEGUNDOS (60000 = 60s).
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
      # Exportação de pacientes (LGPD)
      EXPORT_MAX_ROWS: 100000
      EXPORT_TIMEOUT_MS: 300000
      EXPORT_THROTTLE_LIMIT: 10
      EXPORT_THROTTLE_TTL_MS: 60000
      # Backup (pg_dump instalado na imagem — ver Dockerfile runtime stage)
      PG_DUMP_PATH: pg_dump
      BACKUP_TIMEOUT_MS: 600000
      BACKUP_THROTTLE_LIMIT: 3
      BACKUP_THROTTLE_TTL_MS: 300000
    ports:
      - '3000:3000'
    # Migrations como DONA (MIGRATE_DATABASE_URL); app como prontuario_app (RLS).
    command: sh -c "DATABASE_URL=$$MIGRATE_DATABASE_URL npx prisma migrate deploy && node dist/src/main.js"

  # Observabilidade — Prometheus (scrape /metrics) + Grafana (dashboards).
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: pee2-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.2.0
    container_name: pee2-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '3300:3000'
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafana-data: